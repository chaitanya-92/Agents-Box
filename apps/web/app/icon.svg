<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#080A0D"/>
  <!-- Hexagon outline (pixel-art style) -->
  <polygon
    points="16,2 27,8.5 27,23.5 16,30 5,23.5 5,8.5"
    fill="none"
    stroke="#BAE6FF"
    stroke-width="1.5"
  />
  <!-- Inner glow fill -->
  <polygon
    points="16,5 24.5,10 24.5,22 16,27 7.5,22 7.5,10"
    fill="#0EA5E9"
    fill-opacity="0.12"
  />
  <!-- "A" letterform in sky-blue -->
  <path
    d="M11 22 L16 10 L21 22 M13.2 18 L18.8 18"
    stroke="#BAE6FF"
    stroke-width="2"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />
  <!-- Corner accent dots -->
  <rect x="14" y="13" width="1" height="1" fill="#7DD3FC" opacity="0.6"/>
  <rect x="17" y="13" width="1" height="1" fill="#7DD3FC" opacity="0.6"/>
</svg>
